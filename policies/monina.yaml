agent_id: monina

# Default approval mode (can be overridden per-credential)
default_approval: "both"  # yubikey, phone, both

# Identity hardening (Phase 10)
# Restrict which IPs and User-Agents can use this agent's API key
identity:
  allowed_source_ips:
    - "127.0.0.1"         # localhost only
  allowed_user_agents:    # warning-only (logged, not blocked)
    - "*Claude*"
    - "*claude*"
    - "*httpx*"
    - "*python-requests*"

# Time windows (UTC or local with timezone)
schedule:
  timezone: "America/Los_Angeles"
  allowed_hours: "06:00-23:00"  # deny outside these hours unless override
  override_approval: "yubikey"   # if requesting outside hours, require yubikey only (no phone)

# Rate limits
rate_limits:
  per_minute: 5
  per_hour: 30
  per_day: 100
  on_exceed: "deny_and_alert"  # "deny", "deny_and_alert", "queue"

# Credential-level policies
credentials:
  # Wildcard default
  "*":
    risk: "medium"
    approval: "both"
    cooldown_minutes: 0
    lease_ttl_minutes: 15       # default 15 min lease
    max_lease_minutes: 60       # max renewal up to 60 min
    max_concurrent_leases: 10

  # Specific overrides
  "github-deploy-token":
    risk: "low"
    approval: "phone"           # phone-only is fine for low risk
    cooldown_minutes: 0
    auto_approve_seconds: 30    # auto-approve after 30s if no deny
    lease_ttl_minutes: 30
    max_lease_minutes: 120
    rotate_on_expire: false

  "production-db-password":
    risk: "high"
    approval: "yubikey"         # yubikey only, no phone for high risk
    cooldown_minutes: 60        # can't re-request within 60 min
    requires: ["vpn-credential"]  # must have requested VPN first
    lease_ttl_minutes: 5        # short lease for high-risk
    max_lease_minutes: 15
    rotate_on_expire: true      # rotate in Bitwarden when lease expires
    max_concurrent_leases: 1    # only one checkout at a time

  "aws-root-key":
    risk: "critical"
    approval: "yubikey"
    cooldown_minutes: 1440      # once per day max
    alert_always: true          # always send notification even if approved
    lease_ttl_minutes: 5
    max_lease_minutes: 10
    rotate_on_expire: true
    max_concurrent_leases: 1
