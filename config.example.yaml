# Phase 12: Security tier
#   "gold"   — YubiKey + phone (requires python-fido2 and a registered YubiKey)
#   "silver" — phone-only (no YubiKey needed; elevated approval uses 6-digit codes)
security_tier: "silver"  # "gold" or "silver"

server:
  host: "127.0.0.1"
  port: 8200

agents:
  my-agent:
    api_key: "generate-with-python-setup-gen-key"
    allowed_credentials: ["*"]  # or ["specific-item-name"]

bitwarden:
  cli_path: null  # auto-detected if on PATH
  session_timeout_seconds: 300
  keychain_service: "credential-gate"
  keychain_account: "bitwarden"
  session_refresh_minutes: 10

fido2:
  rp_id: "credential-gate.local"
  rp_name: "Credential Gate"
  credential_store: "data/fido2_credentials.json"

authorization:
  mode: "both"  # "yubikey", "phone", or "both"

timeouts:
  touch_timeout_seconds: 60
  session_timeout_seconds: 300

notifications:
  enabled: true
  ntfy_server: "https://ntfy.sh"          # or self-hosted URL
  ntfy_topic: "credential-gate-CHANGEME"   # unique topic name
  ntfy_token: null                         # optional, for self-hosted with auth
  callback_base_url: "http://127.0.0.1:8200"  # or Cloudflare tunnel URL for remote

policies:
  directory: "policies"
  default_policy: "deny"  # "deny" if no policy file, or "allow_all"

mcp:
  enabled: true
  path: "/mcp"                    # mount point on the FastAPI app
  server_name: "credential-gate"

proxy:
  enabled: true
  actions:
    github-api:
      type: "http"
      credential_name: "github-deploy-token"
      credential_field: "password"
      method: null                    # agent specifies per-request
      url_template: "https://api.github.com/{path}"
      auth_header_template: "Bearer {credential}"
      extra_headers:
        Accept: "application/vnd.github.v3+json"
        User-Agent: "credential-gate-proxy"
      timeout_seconds: 30
      max_response_bytes: 1048576     # 1 MB

    github-git:
      type: "command"
      credential_name: "github-deploy-token"
      credential_field: "password"
      command_template: "git {args}"
      env_inject:
        GIT_ASKPASS: "echo"
        GIT_TERMINAL_PROMPT: "0"
      credential_env_var: "GH_TOKEN"
      allowed_args_pattern: "^(push|pull|fetch|clone|status|log)\\b"
      timeout_seconds: 120
      max_response_bytes: 1048576

    ssh-command:
      type: "command"
      credential_name: "ssh-key-prod"
      credential_field: "notes"       # SSH key stored in notes field
      command_template: "ssh -i {credential_file} {args}"
      allowed_args_pattern: "^[a-zA-Z0-9_.@-]+\\s"
      timeout_seconds: 60
      max_response_bytes: 1048576

    slack-api:
      type: "http"
      credential_name: "slack-bot-token"
      credential_field: "password"
      url_template: "https://slack.com/api/{path}"
      auth_header_template: "Bearer {credential}"
      timeout_seconds: 15
      max_response_bytes: 524288      # 512 KB

observability:
  enabled: true
  anomaly_thresholds:
    default:
      max_requests_per_hour: 30
      max_requests_per_day: 200
      max_unique_credentials_per_hour: 10
      max_denials_per_hour: 5
    # Per-agent overrides:
    # my-agent:
    #   max_requests_per_hour: 20
    #   max_requests_per_day: 100
  daily_digest:
    enabled: true
    time: "23:00"       # local time, 24h format
  dashboard:
    enabled: true
    path: "/dashboard"

discovery:
  enabled: true
  # Additional regex patterns (beyond built-in)
  custom_patterns: []
  # Paths to always exclude from scans
  exclude_paths:
    - "*/node_modules/*"
    - "*/.git/*"
    - "*/venv/*"

rotation:
  enabled: true
  # Age thresholds in days
  stale_threshold_days: 30
  overdue_threshold_days: 90
  # Service-specific config for rotation
  services:
    github:
      # GitHub doesn't support PAT creation via API
      # Scanner will report age + link to create new token
      token_settings_url: "https://github.com/settings/tokens?type=beta"
    cloudflare:
      # Cloudflare API token rotation is fully automatic
      # Requires: current token has "API Tokens: Edit" permission
      api_url: "https://api.cloudflare.com/client/v4"

panic:
  enabled: true
  # Cooldown after unlock — prevents rapid lock/unlock cycling
  cooldown_after_unlock_seconds: 60
  # Auto-panic triggers — lock the gate automatically when thresholds are hit
  auto_triggers:
    # Lock gate if more than N requests per minute system-wide
    requests_per_minute_critical: 50
    # Lock gate if more than N denials per minute (brute-force indicator)
    denials_per_minute_critical: 20
    # Lock gate if an unknown agent ID appears in audit logs
    unknown_agent_lockdown: true

offline:
  enabled: true
  circuit_breaker:
    # Number of consecutive Bitwarden failures before opening circuit
    failure_threshold: 3
    # How long (seconds) before trying Bitwarden again after circuit opens
    recovery_timeout_seconds: 60
    # Send reminder notification if circuit is open longer than this
    max_open_duration_seconds: 300
  cache:
    # Maximum number of credentials to cache
    max_entries: 50
    # Cache TTL by risk level (hours). Critical is ALWAYS 0 — never cached.
    ttl_by_risk:
      low: 8.0
      standard: 4.0
      high: 1.0
      critical: 0.0  # hardcoded, cannot be overridden

# Phase 12: Elevated approval settings (silver tier)
# When security_tier is "silver", operations that normally require YubiKey
# (panic lock/unlock, scan, rotate) use elevated phone approval instead:
# a 6-digit code pushed via Ntfy that must be echoed back.
elevated_approval:
  timeout_seconds: 120  # how long the 6-digit code is valid
  code_length: 6        # number of digits in the confirmation code

audit:
  db_path: "data/audit.db"
