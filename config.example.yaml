server:
  host: "127.0.0.1"
  port: 8200

agents:
  my-agent:
    api_key: "generate-with-python-setup-gen-key"
    allowed_credentials: ["*"]  # or ["specific-item-name"]

bitwarden:
  cli_path: null  # auto-detected if on PATH
  session_timeout_seconds: 300
  keychain_service: "credential-gate"
  keychain_account: "bitwarden"
  session_refresh_minutes: 10

fido2:
  rp_id: "credential-gate.local"
  rp_name: "Credential Gate"
  credential_store: "data/fido2_credentials.json"

authorization:
  mode: "both"  # "yubikey", "phone", or "both"

timeouts:
  touch_timeout_seconds: 60
  session_timeout_seconds: 300

notifications:
  enabled: true
  ntfy_server: "https://ntfy.sh"          # or self-hosted URL
  ntfy_topic: "credential-gate-CHANGEME"   # unique topic name
  ntfy_token: null                         # optional, for self-hosted with auth
  callback_base_url: "http://127.0.0.1:8200"  # or Cloudflare tunnel URL for remote

policies:
  directory: "policies"
  default_policy: "deny"  # "deny" if no policy file, or "allow_all"

mcp:
  enabled: true
  path: "/mcp"                    # mount point on the FastAPI app
  server_name: "credential-gate"

proxy:
  enabled: true
  actions:
    github-api:
      type: "http"
      credential_name: "github-deploy-token"
      credential_field: "password"
      method: null                    # agent specifies per-request
      url_template: "https://api.github.com/{path}"
      auth_header_template: "Bearer {credential}"
      extra_headers:
        Accept: "application/vnd.github.v3+json"
        User-Agent: "credential-gate-proxy"
      timeout_seconds: 30
      max_response_bytes: 1048576     # 1 MB

    github-git:
      type: "command"
      credential_name: "github-deploy-token"
      credential_field: "password"
      command_template: "git {args}"
      env_inject:
        GIT_ASKPASS: "echo"
        GIT_TERMINAL_PROMPT: "0"
      credential_env_var: "GH_TOKEN"
      allowed_args_pattern: "^(push|pull|fetch|clone|status|log)\\b"
      timeout_seconds: 120
      max_response_bytes: 1048576

    ssh-command:
      type: "command"
      credential_name: "ssh-key-prod"
      credential_field: "notes"       # SSH key stored in notes field
      command_template: "ssh -i {credential_file} {args}"
      allowed_args_pattern: "^[a-zA-Z0-9_.@-]+\\s"
      timeout_seconds: 60
      max_response_bytes: 1048576

    slack-api:
      type: "http"
      credential_name: "slack-bot-token"
      credential_field: "password"
      url_template: "https://slack.com/api/{path}"
      auth_header_template: "Bearer {credential}"
      timeout_seconds: 15
      max_response_bytes: 524288      # 512 KB

observability:
  enabled: true
  anomaly_thresholds:
    default:
      max_requests_per_hour: 30
      max_requests_per_day: 200
      max_unique_credentials_per_hour: 10
      max_denials_per_hour: 5
    # Per-agent overrides:
    # my-agent:
    #   max_requests_per_hour: 20
    #   max_requests_per_day: 100
  daily_digest:
    enabled: true
    time: "23:00"       # local time, 24h format
  dashboard:
    enabled: true
    path: "/dashboard"

discovery:
  enabled: true
  # Additional regex patterns (beyond built-in)
  custom_patterns: []
  # Paths to always exclude from scans
  exclude_paths:
    - "*/node_modules/*"
    - "*/.git/*"
    - "*/venv/*"

rotation:
  enabled: true
  # Age thresholds in days
  stale_threshold_days: 30
  overdue_threshold_days: 90
  # Service-specific config for rotation
  services:
    github:
      # GitHub doesn't support PAT creation via API
      # Scanner will report age + link to create new token
      token_settings_url: "https://github.com/settings/tokens?type=beta"
    cloudflare:
      # Cloudflare API token rotation is fully automatic
      # Requires: current token has "API Tokens: Edit" permission
      api_url: "https://api.cloudflare.com/client/v4"

audit:
  db_path: "data/audit.db"
